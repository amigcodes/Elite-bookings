<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Map</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
        }

        .map-container{
            width: 90%;
            margin: 20px auto;
        }

        iframe{
            width: 100%;
            height: 500px;
            border: 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h2>Our Location Near Sarit Centre</h2>

    <div class="map-container">

        <iframe
            src="https://www.google.com/maps?q=Sarit+Centre+Nairobi&output=embed"
            allowfullscreen=""
            loading="lazy">
        </iframe>

    </div>

</body>
</html>
